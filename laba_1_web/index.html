<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Лаба 1</title>
</head>

<body>

    <header class="header">
        <div class="logo header__logo">
            <img src="img/logo.svg" alt="logo" class="logo__img">
            <div class="popup logo__popup">
                <img src="#" alt="avatar" class="popup__img">
                <p class="popup__text">Носурак Максим</p>
            </div>
        </div>

        <nav class="nav header__nav">
            <ul class="nav__list">
                <li class="nav__item">
                    <a href="#" class="nav__link nav__link--active" data-target="word-count">Лічильник слів</a>
                </li>
                <li class="nav__item">
                    <a href="#" class="nav__link" data-target="math">Сума квадратів</a>
                </li>
                <li class="nav__item">
                    <a href="#" class="nav__link" data-target="minesweeper">Сапер</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main">


        <section class="container" id="word-count">
            <h2 class="container__title">Лічильник слів</h2>

            <label for="input" class="label container__label">Введіть ваш текст:</label>

            <textarea name="user-text" id="input" class="textarea container__textarea js-text-input"
                placeholder="..."></textarea>

            <div class="result container__result">
                Кількість слів: <span class="result__value js-word-count">0</span>
            </div>
        </section>


        <section class="container hidden" id="math">
            <h2 class="container__title">Сума квадратів двох чисел</h2>

            <div style="display: flex; flex-direction: column; gap: 1rem; align-items: center; margin-top: 1rem;">
                <label class="container__label" for="input-c">
                    Введіть невід'ємне число c:
                </label>

                <input type="number" id="input-c" class="container__textarea"
                    style="height: auto; text-align: center; font-size: 1.5rem; padding: 0.5rem;" min="0"
                    placeholder="">

                <button id="check-btn" class="button button--restart">Перевірити</button>

                <div id="result-display" class="result" style="text-align: center; margin-top: 1rem;"></div>
            </div>
        </section>



        <section class="container hidden" id="minesweeper">
            <h2 class="container__title">Сапер</h2>
            <div class="game">

                <div class="game__stats">

                    <div class="game__flag-box">
                        🚩: <span class="game__flag-count flag-count">0</span>
                    </div>
                </div>
                <div class="board" id="board"></div>

                <div class="game__controls">
                    <button class="button button--restart" id="minesweeper-restart">Перезапустити</button>
                </div>


            </div>
        </section>

            <select name="" id="">
                <option value="">5</option>
                <option value="">10</option>
            </select>


            <select name="" id="">
                <option value="">5</option>
                <option value="">10</option>
            </select>

            <button>Почати</button>
        </section>
 -->


        <script src="word_count.js"></script>
        <script src="minesweeper.js"></script>
        <script src="q2.js"></script>
        <script src="data.js"></script>
    </main>
</body>

</html>
